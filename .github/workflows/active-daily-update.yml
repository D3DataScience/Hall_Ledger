name: Active Daily Update

on:
  schedule:
    - cron: "15 10 * * *"
    - cron: "30 13 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-active-site:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Restore FanGraphs cache
        uses: actions/cache@v4
        with:
          path: data/fangraphs_cache
          key: fangraphs-cache-v2-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            fangraphs-cache-v2-${{ runner.os }}-

      - name: Install R packages
        run: |
          install.packages(
            c("Lahman", "dplyr", "readr", "stringr", "tibble", "purrr", "jsonlite", "tidyr", "httr"),
            repos = "https://cloud.r-project.org"
          )
        shell: Rscript {0}

      - name: Run active daily update
        run: Rscript active_daily_update.R

      - name: Commit and push updated site files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add active-players data index.html js milestone-players players retired-players styles.css CNAME
          if git diff --cached --quiet; then
            echo "No site changes to commit."
            exit 0
          fi
          git commit -m "Daily active player update"
          git push
